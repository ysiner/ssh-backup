name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push-docker-image:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      run: |
        IMAGE_NAME=ysiner/ssh-app
        IMAGE_TAG=${{ github.sha }}
        docker build -t $IMAGE_NAME:$IMAGE_TAG .
        docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
        docker push $IMAGE_NAME:$IMAGE_TAG
        docker push $IMAGE_NAME:latest

  deploy-to-kubernetes:
    runs-on: self-hosted
    needs: build-and-push-docker-image

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/

    - name: Set up KUBECONFIG
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 --decode > $HOME/.kube/config

    - name: Update Kubernetes Deployment
      env:
        IMAGE_NAME: ysiner/ssh-app
      run: |
        # Update deployment with the new image
        kubectl set image deployment/ssh-app ssh-app=$IMAGE_NAME:latest -n app
        
        # Check rollout status to ensure deployment was successful
        kubectl rollout status deployment/ssh-app -n app
